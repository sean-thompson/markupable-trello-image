name: Build
on:
  push:
    branches: [ main ]
jobs:
  Build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_ENV: production
      PORT: 3000
      POWERUP_NAME: My Power-Up
      POWERUP_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      CONTEXT_PATH: /${{ github.event.repository.name }}
      POWERUP_ID: UNSPECIFIED
      POWERUP_APP_KEY: ${{ secrets.POWERUP_APP_KEY }}
      OPTRO_API_KEY: DISABLED
      OPTRO_LICENSE_TYPE: UNSPECIFIED
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Packages
        run: yarn install --production=false
      - name: Build GitHub Pages
        run: yarn build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: true
